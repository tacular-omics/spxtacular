site_name: spxtacular
hooks:
  - hooks.py
site_description: Mass spectrometry spectrum processing library.
site_url: https://tacular-omics.github.io/spxtacular/
repo_url: https://github.com/tacular-omics/spxtacular
repo_name: tacular-omics/spxtacular
theme:
  name: material

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - md_in_html

nav:
  - Home: index.md
  - Spectrum: spectrum.md
  - Deconvolution: deconvolution.md
  - Readers: readers.md
  - Visualization: visualization.md
  - API Reference: api.md
